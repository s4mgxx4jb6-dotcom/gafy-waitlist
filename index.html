<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gafy — Controla tu plata sin depender de internet</title>
  <meta name="description" content="Gafy es la app de finanzas personales hecha para Colombia. Registra gastos, ingresos y movimientos en segundos. Únete a la lista de espera." />

  <!-- Open Graph (cómo se ve al compartir el link) -->
  <meta property="og:title" content="Gafy — Finanzas personales para Colombia" />
  <meta property="og:description" content="Controla tus gastos sin depender de internet. Únete a la lista de espera." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://gafy.app/og-image.png" />

  <!-- Favicon (logo Gafy inline) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg viewBox='0 0 280 280' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='40' y='40' width='200' height='200' rx='44' fill='%230F172A'/%3E%3Crect x='82' y='105' width='116' height='80' rx='16' fill='white' opacity='0.25'/%3E%3Crect x='88' y='100' width='116' height='80' rx='16' fill='white' opacity='0.5'/%3E%3Crect x='94' y='95' width='116' height='80' rx='16' fill='white'/%3E%3Ccircle cx='180' cy='135' r='14' fill='white' opacity='0.2'/%3E%3Ccircle cx='180' cy='135' r='8' fill='%230F172A'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #EFF6FF;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text: #0F172A;
      --text-secondary: #64748B;
      --text-tertiary: #94A3B8;
      --income: #10B981;
      --expense: #EF4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1080px; margin: 0 auto; padding: 0 20px; }

    /* ---------- Header ---------- */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(248, 250, 252, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; }
    .brand svg { width: 32px; height: 32px; }

    .lang-toggle {
      display: flex; border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; background: var(--surface);
    }
    .lang-toggle button {
      border: none; background: transparent; cursor: pointer;
      padding: 6px 12px; font-family: inherit; font-size: 13px; font-weight: 600;
      color: var(--text-secondary); transition: all .15s;
    }
    .lang-toggle button.active { background: var(--primary); color: white; }

    /* ---------- Hero ---------- */
    .hero { padding: 64px 0 48px; text-align: center; }
    .hero h1 {
      font-size: clamp(32px, 6vw, 54px); font-weight: 800; letter-spacing: -0.02em;
      line-height: 1.1; max-width: 720px; margin: 0 auto 20px;
    }
    .hero h1 .accent { color: var(--primary); }
    .hero .subhead {
      font-size: clamp(16px, 2.5vw, 20px); color: var(--text-secondary);
      max-width: 560px; margin: 0 auto 32px;
    }

    /* ---------- Form ---------- */
    .form-wrap { max-width: 460px; margin: 0 auto; }
    .launchlist-form {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .launchlist-form input {
      flex: 1 1 220px; min-width: 0;
      padding: 14px 16px; font-family: inherit; font-size: 16px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface); color: var(--text); outline: none;
      transition: border-color .15s;
    }
    .launchlist-form input:focus { border-color: var(--primary); }
    .launchlist-form button {
      flex: 0 0 auto; padding: 14px 24px;
      font-family: inherit; font-size: 16px; font-weight: 600;
      background: var(--primary); color: white;
      border: none; border-radius: 12px; cursor: pointer;
      transition: background .15s, transform .05s;
      white-space: nowrap;
    }
    .launchlist-form button:hover { background: #1d4ed8; }
    .launchlist-form button:active { transform: scale(0.98); }
    .form-note { margin-top: 12px; font-size: 13px; color: var(--text-tertiary); }

    /* ---------- Phone mockup ---------- */
    .showcase { padding: 24px 0 56px; display: flex; justify-content: center; }
    .phone {
      width: 280px; height: 560px; border-radius: 42px;
      background: #0F172A; padding: 12px;
      box-shadow: 0 30px 60px -20px rgba(15, 23, 42, 0.35);
    }
    .phone-screen {
      width: 100%; height: 100%; border-radius: 32px; background: var(--bg);
      overflow: hidden; display: flex; flex-direction: column;
      padding: 22px 16px;
    }
    .ps-greeting { font-size: 13px; color: var(--text-secondary); }
    .ps-balance-card {
      margin-top: 12px; background: var(--primary); border-radius: 16px;
      padding: 18px; color: white;
    }
    .ps-balance-card .label { font-size: 12px; opacity: .8; }
    .ps-balance-card .amount { font-size: 30px; font-weight: 700; margin-top: 4px; }
    .ps-balance-card .code { font-size: 12px; opacity: .7; font-weight: 500; }
    .ps-stats { display: flex; gap: 10px; margin-top: 12px; }
    .ps-stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px; }
    .ps-stat .t { font-size: 11px; color: var(--text-secondary); }
    .ps-stat .v { font-size: 15px; font-weight: 700; margin-top: 2px; }
    .ps-stat .v.inc { color: var(--income); }
    .ps-stat .v.exp { color: var(--expense); }
    .ps-section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin: 18px 0 8px; }
    .ps-tx { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    .ps-tx .dot { width: 34px; height: 34px; border-radius: 10px; flex: 0 0 auto; }
    .ps-tx .meta { flex: 1; }
    .ps-tx .meta .n { font-size: 13px; font-weight: 600; }
    .ps-tx .meta .d { font-size: 11px; color: var(--text-tertiary); }
    .ps-tx .amt { font-size: 13px; font-weight: 600; }

    /* ---------- Benefits ---------- */
    .benefits { padding: 56px 0; }
    .section-title { text-align: center; font-size: clamp(24px, 4vw, 34px); font-weight: 700; margin-bottom: 8px; letter-spacing: -0.01em; }
    .section-sub { text-align: center; color: var(--text-secondary); margin-bottom: 40px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 24px;
    }
    .card .icon {
      width: 48px; height: 48px; border-radius: 12px; background: var(--primary-light);
      display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 16px;
    }
    .card h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .card p { color: var(--text-secondary); font-size: 15px; }

    /* ---------- Referral ---------- */
    .referral { padding: 56px 0; }
    .referral-box {
      background: linear-gradient(135deg, var(--primary), #1d4ed8);
      border-radius: 24px; padding: 48px 32px; text-align: center; color: white;
    }
    .referral-box h2 { font-size: clamp(24px, 4vw, 32px); font-weight: 700; margin-bottom: 12px; }
    .referral-box p { opacity: .9; max-width: 520px; margin: 0 auto 28px; font-size: 16px; }
    .referral-box .cta {
      display: inline-block; background: white; color: var(--primary);
      padding: 14px 28px; border-radius: 12px; font-weight: 600; text-decoration: none;
      transition: transform .05s;
    }
    .referral-box .cta:active { transform: scale(0.98); }

    /* ---------- Footer ---------- */
    footer { padding: 40px 0; border-top: 1px solid var(--border); text-align: center; }
    footer .brand { justify-content: center; margin-bottom: 16px; }
    footer .links { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    footer .links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; }
    footer .links a:hover { color: var(--primary); }
    footer .copy { color: var(--text-tertiary); font-size: 13px; }

    @media (max-width: 520px) {
      .launchlist-form { flex-direction: column; }
      .launchlist-form button { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="brand">
        <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">

          <rect x="82" y="105" width="116" height="80" rx="16" fill="white" opacity="0.25"/>
          <rect x="88" y="100" width="116" height="80" rx="16" fill="white" opacity="0.5"/>
          <rect x="94" y="95" width="116" height="80" rx="16" fill="white"/>

        <span>Gafy</span>

      <div class="lang-toggle" role="group" aria-label="Idioma">
        <button data-lang="es" onclick="setLang('es')">ES</button>

    </div>
  </header>

  <main>
    <!-- HERO -->
    <section class="hero">
      <div class="container">

        <p class="subhead" data-i18n="hero_sub"></p>

          <form class="launchlist-form" action="https://getlaunchlist.com/s/h8GNxY" method="POST">

          <p class="form-note" data-i18n="form_note"></p>
        </div>
      </div>
    </section>

    <!-- PHONE MOCKUP -->
    <section class="showcase">
      <div class="phone">
        <div class="phone-screen">
          <div class="ps-greeting" data-i18n="ps_greeting"></div>
          <div class="ps-balance-card">
            <div class="label" data-i18n="ps_balance_label"></div>
            <div class="amount">$ 4.850.000</div>
            <div class="code">COP</div>
          </div>
          <div class="ps-stats">
            <div class="ps-stat">
              <div class="t" data-i18n="ps_income"></div>
              <div class="v inc">+ $ 3.200.000</div>
            </div>

              <div class="t" data-i18n="ps_expense"></div>

          </div>
          <div class="ps-section-title" data-i18n="ps_recent"></div>
          <div class="ps-tx">
            <div class="dot" style="background:#10B981"></div>
            <div class="meta"><div class="n" data-i18n="ps_tx1_n"></div><div class="d" data-i18n="ps_tx1_d"></div></div>
            <div class="amt" style="color:var(--expense)">- $ 32.000</div>
          </div>
          <div class="ps-tx">
            <div class="dot" style="background:#06B6D4"></div>
            <div class="meta"><div class="n" data-i18n="ps_tx2_n"></div><div class="d" data-i18n="ps_tx2_d"></div></div>
            <div class="amt" style="color:var(--income)">+ $ 3.200.000</div>
          </div>
          <div class="ps-tx">
            <div class="dot" style="background:#2563EB"></div>
            <div class="meta"><div class="n" data-i18n="ps_tx3_n"></div><div class="d" data-i18n="ps_tx3_d"></div></div>
            <div class="amt" style="color:var(--primary)">$ 200.000</div>
          </div>
        </div>
      </div>
    </section>

    <!-- BENEFITS -->
    <section class="benefits">
      <div class="container">
        <h2 class="section-title" data-i18n="ben_title"></h2>
        <p class="section-sub" data-i18n="ben_sub"></p>
        <div class="cards">
          <div class="card">
            <div class="icon">🔒</div>
            <h3 data-i18n="ben1_t"></h3>
            <p data-i18n="ben1_p"></p>
          </div>
          <div class="card">
            <div class="icon">⚡</div>
            <h3 data-i18n="ben2_t"></h3>
            <p data-i18n="ben2_p"></p>
          </div>
          <div class="card">
            <div class="icon">🇨🇴</div>
            <h3 data-i18n="ben3_t"></h3>
            <p data-i18n="ben3_p"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- REFERRAL -->
    <section class="referral">
      <div class="container">
        <div class="referral-box">
          <h2 data-i18n="ref_title"></h2>
          <p data-i18n="ref_sub"></p>
          <a href="#top" class="cta" onclick="document.querySelector('.launchlist-form input[name=email]').focus()" data-i18n="ref_cta"></a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="brand">
        <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
          <rect x="40" y="40" width="200" height="200" rx="44" fill="#0F172A"/>
          <rect x="94" y="95" width="116" height="80" rx="16" fill="white"/>
          <circle cx="180" cy="135" r="8" fill="#0F172A"/>
        </svg>
        <span>Gafy</span>
      </div>
      <div class="links">
        <a href="https://s4mgxx4jb6-dotcom.github.io/gafy-privacy/" target="_blank" rel="noopener" data-i18n="foot_privacy"></a>
        <a href="mailto:gafy.app@gmail.com" data-i18n="foot_contact"></a>
      </div>
      <p class="copy" data-i18n="foot_copy"></p>
    </div>
  </footer>

  <!-- LaunchList DIY: maneja el envío AJAX y captura el ?ref= de referidos -->
  <script src="https://getlaunchlist.com/js/widget-diy.js" defer></script>

  <script>
    const I18N = {
      es: {
        hero_title: ['Controla tu plata ', 'sin depender de internet'],
        hero_sub: 'Gafy es la app de finanzas personales hecha para Colombia. Registra gastos, ingresos y movimientos en segundos — todo guardado en tu teléfono.',
        form_name: 'Tu nombre (opcional)',
        form_email: 'Tu correo',
        form_button: 'Unirme a la lista',
        form_note: 'Sé de los primeros en probarla. Sin spam.',
        ps_greeting: 'Hola, Mateo 👋',
        ps_balance_label: 'Balance total',
        ps_income: 'Ingresos',
        ps_expense: 'Gastos',
        ps_recent: 'Recientes',
        ps_tx1_n: 'Comida', ps_tx1_d: 'Hoy',
        ps_tx2_n: 'Salario', ps_tx2_d: 'Ayer',
        ps_tx3_n: 'A Ahorros', ps_tx3_d: '12 jun',
        ben_title: '¿Por qué Gafy?',
        ben_sub: 'Simple, privada y pensada para el día a día en Colombia.',
        ben1_t: 'Tu plata, privada',
        ben1_p: 'Todo vive en tu teléfono. Tú decides si sincronizas en la nube.',
        ben2_t: 'Rápido de verdad',
        ben2_p: 'Registra un gasto en 3 toques. Sin formularios eternos.',
        ben3_t: 'Pensada en pesos',
        ben3_p: 'COP por defecto, también dólares y euros. Sin conversiones raras.',
        ref_title: 'Entra antes que nadie',
        ref_sub: 'Los primeros de la lista prueban Gafy gratis. Comparte tu link e invita amigos para subir de puesto y desbloquear acceso anticipado.',
        ref_cta: 'Unirme a la lista',
        foot_privacy: 'Política de privacidad',
        foot_contact: 'Contacto',
        foot_copy: '© 2026 Gafy. Hecho en Colombia.'
      },
      en: {
        hero_title: ['Control your money ', 'without depending on the internet'],
        hero_sub: 'Gafy is the personal finance app built for Latin America. Track expenses, income and transfers in seconds — all stored on your phone.',
        form_name: 'Your name (optional)',
        form_email: 'Your email',
        form_button: 'Join the waitlist',
        form_note: 'Be among the first to try it. No spam.',
        ps_greeting: 'Hi, Mateo 👋',
        ps_balance_label: 'Total balance',
        ps_income: 'Income',
        ps_expense: 'Expenses',
        ps_recent: 'Recent',
        ps_tx1_n: 'Food', ps_tx1_d: 'Today',
        ps_tx2_n: 'Salary', ps_tx2_d: 'Yesterday',
        ps_tx3_n: 'To Savings', ps_tx3_d: 'Jun 12',
        ben_title: 'Why Gafy?',
        ben_sub: 'Simple, private and built for everyday life.',
        ben1_t: 'Your money, private',
        ben1_p: 'Everything lives on your phone. You decide if you sync to the cloud.',
        ben2_t: 'Genuinely fast',
        ben2_p: 'Log an expense in 3 taps. No endless forms.',
        ben3_t: 'Multi-currency',
        ben3_p: 'Works in COP, USD and EUR. No weird conversions.',
        ref_title: 'Get in before everyone else',
        ref_sub: 'The first on the list try Gafy for free. Share your link and invite friends to move up and unlock early access.',
        ref_cta: 'Join the waitlist',
        foot_privacy: 'Privacy policy',
        foot_contact: 'Contact',
        foot_copy: '© 2026 Gafy. Made in Colombia.'
      }
    };

    function applyLang(lang) {
      const dict = I18N[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = dict[key];
        if (Array.isArray(val)) {
          el.innerHTML = val[0] + '<span class="accent">' + val[1] + '</span>';
        } else if (val !== undefined) {
          el.textContent = val;
        }
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const key = el.getAttribute('data-i18n-ph');
        if (dict[key] !== undefined) el.setAttribute('placeholder', dict[key]);
      });
      document.querySelectorAll('.lang-toggle button').forEach(b => {
        b.classList.toggle('active', b.getAttribute('data-lang') === lang);
      });
    }

    function setLang(lang) {
      localStorage.setItem('gafy_lang', lang);
      applyLang(lang);
    }

    // Detección: 1) preferencia guardada  2) idioma del navegador  3) español por defecto
    (function () {
      const saved = localStorage.getItem('gafy_lang');
      const browser = (navigator.language || 'es').toLowerCase();
      const lang = saved || (browser.startsWith('es') ? 'es' : 'en');
      applyLang(lang);
    })();
  </script>
</body>
</html>
