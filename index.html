  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1d4ed8;
      --ink: #0B1220;
      --text: #1E293B;
      --muted: #64748B;
      --faint: #94A3B8;
      --line: #ECEFF4;
      --surface: #FFFFFF;
      --income: #10B981;
      --expense: #EF4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF;
      color: var(--text);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .container { max-width: 1080px; margin: 0 auto; padding: 0 28px; }

    /* faint glow behind hero */
    .glow {
      position: absolute; top: -180px; left: 50%; transform: translateX(-50%);
      width: 900px; height: 600px; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at center, rgba(37,99,235,0.10), rgba(37,99,235,0) 65%);
    }

    /* ---------- Header ---------- */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.7);
      backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    header.scrolled { border-bottom-color: var(--line); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .brand { display: flex; align-items: center; gap: 11px; font-weight: 700; font-size: 21px; letter-spacing: -0.01em; color: var(--ink); }
    .brand svg { width: 34px; height: 34px; }

    .lang-toggle { display: flex; gap: 2px; background: #F1F5F9; border-radius: 999px; padding: 3px; }
    .lang-toggle button {
      border: none; background: transparent; cursor: pointer;
      padding: 6px 14px; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600;
      color: var(--muted); transition: all .18s;
    }
    .lang-toggle button.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 3px rgba(11,18,32,.08); }

    /* ---------- Hero ---------- */
    .hero { position: relative; padding: 96px 0 64px; text-align: center; overflow: hidden; }
    .hero .container { position: relative; z-index: 1; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; letter-spacing: .02em; color: var(--primary);
      background: #EFF4FF; border: 1px solid #DCE7FF; border-radius: 999px;
      padding: 7px 14px; margin-bottom: 28px;
    }
    .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); }
    .hero h1 {
      font-size: clamp(38px, 6.5vw, 66px); font-weight: 700; letter-spacing: -0.03em;
      line-height: 1.05; max-width: 800px; margin: 0 auto 24px; color: var(--ink);
    }
    .hero h1 .accent { color: var(--primary); }
    .hero .subhead {
      font-size: clamp(17px, 2.2vw, 21px); font-weight: 400; color: var(--muted);
      max-width: 600px; margin: 0 auto 40px; line-height: 1.6;
    }

    /* ---------- Form ---------- */
    .form-wrap { max-width: 480px; margin: 0 auto; }
    .launchlist-form { display: flex; flex-direction: column; gap: 10px; }
    .form-row { display: flex; gap: 10px; }
    .launchlist-form input {
      flex: 1 1 0; min-width: 0; padding: 15px 18px;
      font-family: inherit; font-size: 16px; color: var(--ink);
      border: 1px solid #DCE2EC; border-radius: 14px; background: var(--surface); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .launchlist-form input::placeholder { color: var(--faint); }
    .launchlist-form input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,.12); }
    .launchlist-form button {
      width: 100%; padding: 16px 28px;
      font-family: inherit; font-size: 16px; font-weight: 600; color: white;
      background: var(--primary); border: none; border-radius: 14px; cursor: pointer;
      transition: background .15s, transform .05s, box-shadow .15s;
      box-shadow: 0 8px 20px -8px rgba(37,99,235,.6); white-space: nowrap;
    }
    .launchlist-form button:hover { background: var(--primary-dark); box-shadow: 0 10px 24px -8px rgba(37,99,235,.7); }
    .launchlist-form button:active { transform: scale(0.98); }
    .form-note { margin-top: 14px; font-size: 13.5px; color: var(--faint); }

    /* ---------- Phone mockup ---------- */
    .showcase { padding: 56px 0 88px; display: flex; justify-content: center; }
    .phone {
      width: 290px; height: 588px; border-radius: 46px; background: var(--ink);
      padding: 13px; box-shadow: 0 50px 90px -30px rgba(11,18,32,.45), 0 10px 30px -15px rgba(11,18,32,.3);
    }
    .phone-screen {
      width: 100%; height: 100%; border-radius: 34px; background: #F8FAFC;
      overflow: hidden; display: flex; flex-direction: column; padding: 26px 18px;
    }
    .ps-greeting { font-size: 13px; color: var(--muted); font-weight: 500; }
    .ps-balance-card {
      margin-top: 14px; background: linear-gradient(150deg, #2563EB, #1d4ed8);
      border-radius: 20px; padding: 20px; color: white; box-shadow: 0 12px 24px -12px rgba(37,99,235,.6);
    }
    .ps-balance-card .label { font-size: 12px; opacity: .82; font-weight: 500; }
    .ps-balance-card .amount { font-size: 32px; font-weight: 700; margin-top: 6px; letter-spacing: -0.01em; }
    .ps-curr { display: flex; gap: 6px; margin-top: 12px; }
    .ps-curr span { font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: rgba(255,255,255,.18); }
    .ps-curr span.on { background: rgba(255,255,255,.92); color: var(--primary); }
    .ps-stats { display: flex; gap: 11px; margin-top: 14px; }
    .ps-stat { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 13px; }
    .ps-stat .t { font-size: 11px; color: var(--muted); }
    .ps-stat .v { font-size: 15px; font-weight: 700; margin-top: 3px; letter-spacing: -0.01em; }
    .ps-stat .v.inc { color: var(--income); }
    .ps-stat .v.exp { color: var(--expense); }
    .ps-section-title { font-size: 11.5px; font-weight: 600; color: var(--muted); margin: 20px 0 6px; }
    .ps-tx { display: flex; align-items: center; gap: 11px; padding: 9px 0; }
    .ps-tx .dot { width: 36px; height: 36px; border-radius: 11px; flex: 0 0 auto; }
    .ps-tx .meta { flex: 1; }
    .ps-tx .meta .n { font-size: 13px; font-weight: 600; color: var(--ink); }
    .ps-tx .meta .d { font-size: 11px; color: var(--faint); }
    .ps-tx .amt { font-size: 13px; font-weight: 600; }

    /* ---------- Benefits ---------- */
    .benefits { padding: 40px 0 64px; }
    .section-head { text-align: center; max-width: 620px; margin: 0 auto 56px; }
    .section-head h2 { font-size: clamp(28px, 4vw, 40px); font-weight: 700; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 14px; }
    .section-head p { color: var(--muted); font-size: 17px; }
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; }
    .feature {
      padding: 32px 28px; border: 1px solid var(--line); border-radius: 20px; background: var(--surface);
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .feature:hover { border-color: #D7E0F0; transform: translateY(-3px); box-shadow: 0 20px 40px -24px rgba(11,18,32,.2); }
    .feature .ico {
      width: 46px; height: 46px; border-radius: 13px; background: #EFF4FF;
      display: flex; align-items: center; justify-content: center; color: var(--primary); margin-bottom: 18px;
    }
    .feature .ico svg { width: 24px; height: 24px; }
    .feature h3 { font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 7px; }
    .feature p { color: var(--muted); font-size: 14.5px; line-height: 1.6; }

    /* ---------- Referral / CTA ---------- */
    .cta-section { padding: 64px 0 96px; }
    .cta-box {
      position: relative; overflow: hidden; border-radius: 28px;
      background: var(--ink); color: white; padding: 72px 40px; text-align: center;
    }
    .cta-box::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(37,99,235,.55), rgba(37,99,235,0) 60%);
    }
    .cta-box > * { position: relative; z-index: 1; }
    .cta-box h2 { font-size: clamp(26px, 4vw, 38px); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }
    .cta-box p { opacity: .82; max-width: 540px; margin: 0 auto 32px; font-size: 16.5px; line-height: 1.6; }
    .cta-box .btn {
      display: inline-block; background: white; color: var(--ink);
      padding: 15px 32px; border-radius: 14px; font-weight: 600; font-size: 16px; text-decoration: none;
      transition: transform .05s, box-shadow .2s; box-shadow: 0 10px 30px -10px rgba(0,0,0,.5);
    }
    .cta-box .btn:hover { box-shadow: 0 14px 36px -10px rgba(0,0,0,.6); }
    .cta-box .btn:active { transform: scale(0.98); }

    /* ---------- Footer ---------- */
    footer { padding: 48px 0; border-top: 1px solid var(--line); }
    .footer-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
    footer .brand { font-size: 18px; }
    footer .brand svg { width: 28px; height: 28px; }
    footer .links { display: flex; gap: 28px; flex-wrap: wrap; }
    footer .links a { color: var(--muted); text-decoration: none; font-size: 14px; transition: color .15s; }
    footer .links a:hover { color: var(--primary); }
    footer .copy { color: var(--faint); font-size: 13px; width: 100%; text-align: center; margin-top: 8px; }

    /* ---------- Scroll reveal ---------- */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .7s ease, transform .7s ease; }
    .reveal.in { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }

    @media (max-width: 480px) {
      .form-row { flex-direction: column; }
      .cta-box { padding: 56px 24px; }
    }
  </style>
</head>

        ben4_p: 'Manage several currencies at once, with clear conversions and no surprises.',
        ref_title: 'Get in before everyone else',
        ref_sub: 'The first on the list try Gafy for free. Share your link and invite friends to move up and unlock early access.',
        ref_cta: 'Join the waitlist',
        foot_privacy: 'Privacy policy',
        foot_contact: 'Contact',
        foot_copy: '© 2026 Gafy. All rights reserved.'
      }
    };

    function applyLang(lang) {
      const dict = I18N[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const val = dict[el.getAttribute('data-i18n')];
        if (Array.isArray(val)) el.innerHTML = val[0] + '<span class="accent">' + val[1] + '</span>';
        else if (val !== undefined) el.textContent = val;
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const v = dict[el.getAttribute('data-i18n-ph')];
        if (v !== undefined) el.setAttribute('placeholder', v);
      });
      document.querySelectorAll('.lang-toggle button').forEach(b => {
        b.classList.toggle('active', b.getAttribute('data-lang') === lang);
      });
    }
    function setLang(lang) { localStorage.setItem('gafy_lang', lang); applyLang(lang); }

    (function () {
      const saved = localStorage.getItem('gafy_lang');
      const browser = (navigator.language || 'es').toLowerCase();
      applyLang(saved || (browser.startsWith('es') ? 'es' : 'en'));
    })();

    // Header border on scroll
    const hdr = document.getElementById('hdr');
    addEventListener('scroll', () => hdr.classList.toggle('scrolled', scrollY > 8), { passive: true });

    // Scroll reveal
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  </script>
</body>
</html>
